<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verlytax OS — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --input-bg:  #1a1a26;
      --text:      #e8e8f0;
      --muted:     #6b6b8a;
      --accent:    #6c63ff;
      --accent-dk: #4f46e5;
      --red:       #ef4444;
      --green:     #10b981;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6c63ff 0%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 0.78rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 2px;
    }

    button[type="submit"]:hover  { opacity: 0.92; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer-note {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 22px;
      line-height: 1.6;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">VX</div>
      <div class="logo-text">
        <span class="logo-name">Verlytax OS</span>
        <span class="logo-sub">Operations Platform</span>
      </div>
    </div>

    <h1>CEO Sign In</h1>
    <p class="subtitle">Operations Command Center — authorized access only.</p>

    <div id="error-msg" class="error-msg" style="display:none">
      Invalid username or password. Try again.
    </div>

    <form method="POST" action="/auth/login">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        placeholder="Enter username"
        autocomplete="username"
        required
        autofocus
      >

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      >

      <button type="submit">Sign In to Verlytax OS →</button>
    </form>

    <p class="footer-note">
      <span class="status-dot"></span>
      All AI agents running 24/7 — Erin · Nova · Mya · Cora · Zara
    </p>
  </div>
</body>
</html>
